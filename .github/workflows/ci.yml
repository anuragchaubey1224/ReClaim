name: ci

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }} · py${{ matrix.python }})
    strategy:
      fail-fast: false
      matrix:
        # Windows is best-effort (the platform/ layer runs there, but byte-accounting is
        # approximate and unverified) so it's not a CI gate — see docs/windows-testing-guide.md.
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest
