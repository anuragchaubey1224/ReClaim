# Publishes `reclaim-disk` to PyPI when a GitHub Release is published.
name: publish

# A published Release — not a bare tag push — is the trigger, so cutting a tag stays
# reversible and the release notes are written before anything is uploaded. PyPI versions
# are immutable: once `0.1.1` is up it can never be replaced, only yanked.
on:
  release:
    types: [published]

jobs:
  test:
    name: test before publishing (${{ matrix.os }} · py${{ matrix.python }})
    strategy:
      fail-fast: true
      matrix:
        # macOS + Linux gate the release; Windows is best-effort and not a publish gate.
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[dev]"
      - run: pytest

  build:
    name: build distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      # Fails the release rather than shipping a broken PyPI page.
      - run: twine check --strict dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment gives a second gate: require a reviewer on it in repo settings and no
    # release can upload without approval.
    environment:
      name: pypi
      url: https://pypi.org/p/reclaim-disk
    permissions:
      # Mints the short-lived OIDC token Trusted Publishing exchanges for an upload token.
      # This is why no PyPI API token is stored in this repo.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
